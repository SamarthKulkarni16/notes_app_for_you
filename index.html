<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Notes — open, write, leave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13151a;
    --bg-lower:#0e1014;
    --text-primary:#e9eaed;
    --text-muted:#6b7079;
    --text-faint:#3a3f48;
    --sage:#8b9d83;
    --hairline:#22252c;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body{
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
    background:var(--bg);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body{
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- TOP: app recreation ---------- */
  .app-screen{
    flex:1.15;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6vh 6vw 2vh;
    position:relative;
  }

  .entry{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    gap:0.55rem;
  }

  .date-heading{
    font-family:'Source Serif 4', Georgia, serif;
    font-weight:600;
    font-size:clamp(1.5rem, 1.1rem + 1.6vw, 1.9rem);
    color:var(--text-primary);
    letter-spacing:-0.01em;
    line-height:1.15;
  }

  .time-label{
    font-size:0.72rem;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
  }

  .entry-body{
    margin-top:1.6rem;
    font-size:clamp(0.95rem, 0.85rem + 0.4vw, 1.05rem);
    line-height:1.65;
    color:var(--text-primary);
    min-height:7.5em;
    font-weight:400;
  }

  .entry-body .placeholder{
    color:var(--text-faint);
  }

  .cursor{
    display:inline-block;
    width:2px;
    height:1.1em;
    background:var(--text-primary);
    margin-left:1px;
    vertical-align:-0.18em;
    animation:blink 1s step-start infinite;
  }
  .cursor.hidden{ display:none; }

  @keyframes blink{
    50%{ opacity:0; }
  }

  .status-row{
    margin-top:1.8rem;
    display:flex;
    align-items:center;
    gap:0.5rem;
    height:1.2rem;
  }

  .status-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--text-muted);
    flex-shrink:0;
    transition:background-color 0.4s ease;
  }
  .status-dot.sage{ background:var(--sage); }
  .status-dot.pulse{
    animation:dotpulse 1.1s ease-in-out infinite;
  }
  @keyframes dotpulse{
    0%, 100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.35; transform:scale(0.78); }
  }

  .status-text{
    font-size:0.72rem;
    font-weight:500;
    letter-spacing:0.04em;
    color:var(--text-muted);
    transition:color 0.4s ease;
  }
  .status-text.sage{ color:var(--sage); }

  /* ---------- fade seam ---------- */
  .seam{
    flex:0 0 auto;
    height:14vh;
    background:linear-gradient(to bottom, var(--bg) 0%, var(--bg-lower) 100%);
    position:relative;
  }

  /* ---------- BOTTOM: download ---------- */
  .download-section{
    flex:0.85;
    min-height:0;
    background:var(--bg-lower);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:0.9rem;
    padding:2vh 6vw 4vh;
  }

  .download-kicker{
    font-size:0.68rem;
    font-weight:500;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-muted);
  }

  .download-btn{
    appearance:none;
    border:none;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:0.65rem;
    background:var(--text-primary);
    color:var(--bg-lower);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:clamp(0.95rem, 0.85rem + 0.4vw, 1.05rem);
    padding:0.95rem 1.9rem;
    border-radius:8px;
    cursor:pointer;
    letter-spacing:-0.01em;
    transition:transform 0.15s ease, background-color 0.2s ease;
  }

  .download-btn:hover{
    background:#ffffff;
    transform:translateY(-1px);
  }
  .download-btn:active{
    transform:translateY(0px) scale(0.98);
  }

  .download-btn svg{
    width:16px;
    height:16px;
    flex-shrink:0;
  }

  .download-sub{
    font-size:0.72rem;
    color:var(--text-faint);
    letter-spacing:0.02em;
  }

  @media (max-height: 560px){
    .app-screen{ padding:4vh 6vw 1vh; }
    .seam{ height:8vh; }
    .entry-body{ min-height:5.5em; margin-top:1rem; }
    .status-row{ margin-top:1rem; }
  }
</style>
</head>
<body>

  <div class="app-screen">
    <div class="entry">
      <div class="date-heading" id="dateHeading">—</div>
      <div class="time-label" id="timeLabel">—</div>
      <div class="entry-body" id="entryBody"><span class="placeholder" id="placeholderText"></span><span class="cursor" id="cursor"></span></div>
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText"></span>
      </div>
    </div>
  </div>

  <div class="seam"></div>

  <div class="download-section">
    <a class="download-btn" id="downloadBtn" href="https://github.com/SamarthKulkarni16/notes_app_for_you/releases/latest/download/notes-app.apk" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"></path>
        <path d="M7 10l5 5 5-5"></path>
        <path d="M5 21h14"></path>
      </svg>
      Download
    </a>
  </div>

<script>
  const quotes = [
    "Success is not the fire of motivation but the quiet return to your baseline emotion.",
    "Each subscription you invite into your life is but a new liability upon your time.",
    "When the world is a storm beyond your hands, choose exactly which variable you will blame.",
    "The goal of growth is not the absence of trouble but the invitation of better, more beautiful problems.",
    "The present moment is the least stable shore in the vast ocean of time.",
    "Do not let comparison make you small; let it be the map that shows the gap in your journey.",
    "We never truly break a chain; we only substitute one link for another until the metal is strong.",
    "Seek not the million in currency, but to pour out a million's worth of light into the world.",
    "The universe is a scale that always finds its weight; what you give in input must return in output.",
    "Problems are never finished or cast aside; they are merely upgraded to higher peaks.",
    "To live is to solve; the day you have no problems is the day the heart stops its work.",
    "If the path is boring, it is working; if it works, the world will eventually call it interesting.",
    "An insult is but a gift of feedback wrapped in thorns; you may use it or be used by it.",
    "Anger is not a poison to be purged but a nitro-boost for the engine of your purpose.",
    "You already possess the treasures you seek; they are simply disguised as time and energy yet to be spent.",
    "Mastery is the art of occupying your life with voluntary conflicts so the involuntary ones find no room to enter.",
    "The later you wait for never arrives, so claim the now to buy the space of your future.",
    "In the theater of life, you are either the master of your tools or a servant to their weight.",
    "Happiness is found in the praise of small things like the filling of the stomach and the comfort of the bed.",
    "Forget the ghosts of yesterday and the shadows of tomorrow; your worth is measured only by the work of today."
  ];

  const dateHeading = document.getElementById('dateHeading');
  const timeLabel = document.getElementById('timeLabel');
  const entryBody = document.getElementById('entryBody');
  const placeholderText = document.getElementById('placeholderText');
  const cursor = document.getElementById('cursor');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // live date/time, visitor's own timezone
  function updateClock(){
    const now = new Date();
    const dateOpts = { year:'numeric', month:'long', day:'numeric' };
    dateHeading.textContent = now.toLocaleDateString(undefined, dateOpts);
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    timeLabel.textContent = `${h}:${m} ${ampm}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function setStatus(text, opts = {}){
    statusText.textContent = text;
    statusDot.classList.toggle('sage', !!opts.sage);
    statusText.classList.toggle('sage', !!opts.sage);
    statusDot.classList.toggle('pulse', !!opts.pulse);
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  let lastIndex = -1;
  function pickQuote(){
    let i;
    do { i = Math.floor(Math.random() * quotes.length); } while (i === lastIndex && quotes.length > 1);
    lastIndex = i;
    return quotes[i];
  }

  async function typeQuote(text){
    cursor.classList.remove('hidden');
    for (let i = 0; i < text.length; i++){
      entryBody.textContent = text.slice(0, i + 1);
      entryBody.appendChild(cursor);
      const ch = text[i];
      let delay = 55 + Math.random() * 65;
      if (ch === ' ') delay *= 0.65;
      if (ch === ',' || ch === ';') delay += 240;
      if (ch === '.' || ch === '\u2014') delay += 140;
      await sleep(delay);
    }
  }

  function clearEntry(){
    entryBody.innerHTML = '';
    placeholderText.textContent = '';
    entryBody.appendChild(placeholderText);
    entryBody.appendChild(cursor);
  }

  async function loop(){
    while (true){
      clearEntry();
      setStatus('');
      cursor.classList.remove('hidden');
      await sleep(900);

      const quote = pickQuote();
      await typeQuote(quote);
      cursor.classList.add('hidden');

      await sleep(1300);
      setStatus('saving…');
      await sleep(650);

      setStatus('saved on device');
      await sleep(950);

      setStatus('syncing…', { sage:true, pulse:true });
      await sleep(1100);

      setStatus('synced', { sage:true });
      await sleep(4200);

      await sleep(900);
    }
  }

  loop();
</script>

</body>
</html>
